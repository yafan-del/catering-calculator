<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF6B35"/>
      <stop offset="100%" style="stop-color:#F7931E"/>
    </linearGradient>
  </defs>
  <rect width="1024" height="1024" rx="192" fill="url(#bg)"/>
  <!-- 碗 -->
  <ellipse cx="512" cy="340" rx="200" ry="60" fill="none" stroke="white" stroke-width="28"/>
  <path d="M312 340 Q312 520 512 520 Q712 520 712 340" fill="none" stroke="white" stroke-width="28" stroke-linecap="round"/>
  <!-- 蒸汽 -->
  <path d="M420 240 Q400 200 420 160" fill="none" stroke="white" stroke-width="16" stroke-linecap="round" opacity="0.7"/>
  <path d="M512 220 Q492 180 512 140" fill="none" stroke="white" stroke-width="16" stroke-linecap="round" opacity="0.7"/>
  <path d="M604 240 Q584 200 604 160" fill="none" stroke="white" stroke-width="16" stroke-linecap="round" opacity="0.7"/>
  <!-- 计算器面板 -->
  <rect x="312" y="580" width="400" height="260" rx="24" fill="rgba(255,255,255,0.95)"/>
  <!-- ¥ 符号 -->
  <path d="M380 640 L420 670 L380 700 M400 660 L440 660 M400 680 L440 680" fill="none" stroke="#FF6B35" stroke-width="10" stroke-linecap="round"/>
  <!-- 数字线 -->
  <rect x="460" y="650" width="200" height="12" rx="6" fill="#FF6B35" opacity="0.8"/>
  <rect x="460" y="680" width="140" height="8" rx="4" fill="#67C23A" opacity="0.6"/>
  <!-- 按钮行 -->
  <rect x="340" y="730" width="70" height="36" rx="8" fill="#F0F0F0"/>
  <rect x="428" y="730" width="70" height="36" rx="8" fill="#F0F0F0"/>
  <rect x="516" y="730" width="70" height="36" rx="8" fill="#F0F0F0"/>
  <rect x="604" y="730" width="70" height="36" rx="8" fill="#FF6B35"/>
  <!-- 等号 -->
  <rect x="620" y="740" width="38" height="5" rx="2" fill="white"/>
  <rect x="620" y="750" width="38" height="5" rx="2" fill="white"/>
  <!-- 分割线 -->
  <line x1="340" y1="790" x2="684" y2="790" stroke="#E8E8E8" stroke-width="2"/>
  <!-- 净利润区域 -->
  <rect x="340" y="800" width="140" height="24" rx="6" fill="#67C23A" opacity="0.15"/>
  <rect x="350" y="808" width="60" height="8" rx="4" fill="#67C23A"/>
