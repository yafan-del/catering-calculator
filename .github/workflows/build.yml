name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            args: ''
            target: x86_64-pc-windows-msvc
            bundle_dir: target/release/bundle/nsis
          - platform: macos-latest
            args: '--target universal-apple-darwin'
            target: aarch64-apple-darwin,x86_64-apple-darwin
            bundle_dir: target/universal-apple-darwin/release/bundle/dmg

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install frontend dependencies
        run: pnpm install

      - name: Verify signing key
        shell: bash
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        run: |
          if [ -z "$TAURI_SIGNING_PRIVATE_KEY" ]; then
            echo "ERROR: TAURI_SIGNING_PRIVATE_KEY is EMPTY!"
          else
            echo "TAURI_SIGNING_PRIVATE_KEY is set, length: ${#TAURI_SIGNING_PRIVATE_KEY}"
            echo "First 20 chars: ${TAURI_SIGNING_PRIVATE_KEY:0:20}..."
            echo "Last 10 chars: ...${TAURI_SIGNING_PRIVATE_KEY: -10}"
          fi

      - name: Build Tauri app
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: 'catering2026'
        run: pnpm tauri build ${{ matrix.args }}

      - name: Debug - List artifacts
        shell: bash
        run: |
          echo "=== Bundle dir ==="
          ls -laR src-tauri/${{ matrix.bundle_dir }}/ 2>/dev/null || echo "not found"
          echo "=== All .sig files ==="
          find src-tauri/target -name "*.sig" 2>/dev/null || echo "none"

      - name: Create Release & Upload
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          gh release create "$TAG" --title "餐饮计算器 $TAG" --notes "请下载对应平台的安装包。" --latest 2>/dev/null || true
          for f in src-tauri/${{ matrix.bundle_dir }}/*; do
            [ -f "$f" ] && echo "Uploading $f" && gh release upload "$TAG" "$f" --clobber || true
          done
